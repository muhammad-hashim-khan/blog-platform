<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Blog Dashboard</h1>

<button onclick="logout()">
Logout
</button>

<input
id="title"
placeholder="Blog Title">

<textarea
id="content"
placeholder="Write your blog..."
rows="5">
</textarea>

<button onclick="createPost()">
Publish Post
</button>

<div id="posts"></div>

</div>

<script src="script.js"></script>

</body>
</html>
